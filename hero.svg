<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#13100d"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <pattern id="board" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#c9a227" opacity="0.04"/>
      <rect x="20" y="20" width="20" height="20" fill="#c9a227" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background layers -->
  <rect width="900" height="280" fill="url(#bg)"/>
  <rect width="900" height="280" fill="url(#board)"/>

  <!-- Large ghost knight - right side decorative -->
  <text x="560" y="262"
    font-family="Arial, Helvetica, sans-serif"
    font-size="240"
    fill="#c9a227"
    opacity="0.06">♞</text>

  <!-- Gold left accent bar -->
  <rect x="60" y="65" width="3" height="150" fill="#c9a227" rx="1.5"/>

  <!-- Small gold pawn accent - top right area -->
  <text x="835" y="72"
    font-family="Arial, Helvetica, sans-serif"
    font-size="22"
    fill="#c9a227"
    opacity="0.5">♟</text>

  <!-- Role label -->
  <text x="80" y="98"
    font-family="Courier New, Courier, monospace"
    font-size="11"
    fill="#8b949e"
    letter-spacing="5">BACKEND ENGINEER  ·  DELHI / NCR</text>

  <!-- Name -->
  <text x="76" y="178"
    font-family="Arial, Helvetica, sans-serif"
    font-size="60"
    font-weight="800"
    fill="#ffffff">Aman Chauhan</text>

  <!-- Gold tagline -->
  <text x="80" y="220"
    font-family="Courier New, Courier, monospace"
    font-size="13"
    fill="#c9a227"
    letter-spacing="1">I don't play for the move. I play for the position.</text>
</svg>
